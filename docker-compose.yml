  minio:
    image: quay.io/minio/minio:latest
    container_name: minio_server
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      #MINIO_ROOT_USER: minioadmin
      #MINIO_ROOT_PASSWORD: minioadmin

      MINIO_ROOT_USER: desarrollo
