services:

  app:
    build: .
    container_name: archpat-nitrous
    ports:
      - "8080:8080"
      #- "7070:7070"
    volumes:
      - .:/app
    depends_on:
      - redis
      - minio
      #- postgres
    environment:
      PYTHONUNBUFFERED: "1"
      REDIS_HOST: redis
      REDIS_PORT: 6379

      #MINIO_ENDPOINT: minio:9000
      #MINIO_ACCESS_KEY: minioadmin
      #MINIO_SECRET_KEY: minioadmin
      #MINIO_BUCKET: exports

      MINIO_ENDPOINT: 10.10.119.104:9000
      MINIO_ACCESS_KEY: desarrollo
      MINIO_SECRET_KEY: Previ.2024**
      MINIO_BUCKET: silver

      POSTGRES_HOST: host.docker.internal
      POSTGRES_PORT: 5432
      POSTGRES_DB: centro-datos-bi-v2
      POSTGRES_USER: db_dev
      POSTGRES_PASSWORD: Pr3v1-2026.dev*

    env_file:
      - .env
  
  redis:
    image: redis:7
    container_name: redis
    ports: 
      - "6379:6379"
  
  worker: 
    build: .
    volumes:
      - .:/app
    container_name: rq_worker
    #command: rq worker --url redis://redis:6379
    command: python -m app.workers.worker
    depends_on:
      - redis
      #- postgres
    environment:
      PYTHONUNBUFFERED: "1"
      REDIS_HOST: redis
      REDIS_PORT: 6379

      #MINIO_ENDPOINT: minio:9000
      #MINIO_ACCESS_KEY: minioadmin
      #MINIO_SECRET_KEY: minioadmin
      #MINIO_BUCKET: exports

      MINIO_ENDPOINT: 10.10.119.104:9000
      MINIO_ACCESS_KEY: desarrollo
      MINIO_SECRET_KEY: Previ.2024**
      MINIO_BUCKET: silver

      POSTGRES_HOST: host.docker.internal
      POSTGRES_PORT: 5432
      POSTGRES_DB: centro-datos-bi-v2
      POSTGRES_USER: db_dev
      POSTGRES_PASSWORD: Pr3v1-2026.dev*
    env_file:
      - .env
  
